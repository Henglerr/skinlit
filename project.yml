name: SkinScore
options:
  bundleIdPrefix: com.skinscore
  deploymentTarget:
    iOS: 17.0
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
targets:
  SkinScore:
    type: application
    platform: iOS
    sources: [App, Config, Core, Features, DesignSystem, Resources]
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: GoogleSignIn
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Resources/SkinScore.entitlements
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: Resources/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        GIDClientID: $(GOOGLE_CLIENT_ID)
        SkinAnalysisAPIEndpoint: $(SKIN_ANALYSIS_API_ENDPOINT)
        AppShareURL: $(APP_SHARE_URL)
        NSCameraUsageDescription: "SkinScore uses the camera to capture a selfie for cloud-based cosmetic skin analysis."
        NSPhotoLibraryUsageDescription: "SkinScore lets you choose a photo for cloud-based cosmetic skin analysis."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
